services:
  auditorr:
    build: .                      # builds from source — remove this line if using a pre-built image
    # image: auditorr:latest      # uncomment to use a pre-built image instead
    container_name: auditorr
    restart: unless-stopped
    ports:
      - "8677:8677"
    volumes:
      - ./data:/app/data          # config, history, SQLite db
      - /path/to/media:/data/media:ro
      - /path/to/torrents:/data/torrents:ro
    environment:
      # Configure qBittorrent, Sonarr, Radarr, and thresholds via the Config tab in the UI.
      # No environment variables needed for integration settings.
      - AUDITORR_PORT=8677
      # Uncomment to enable API authentication:
      # - AUDITORR_SECRET=your-secret-key-here
